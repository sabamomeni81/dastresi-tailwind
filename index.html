<!DOCTYPE html>
<html lang="en" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/output.css" />
    <link rel="icon" type="image/png" href="./public/images/favicon/icon.png" />
    <title>فروشگاه اینترنتی دسترسی</title>
  </head>
  <body>
    <!-- #region header -->
    <div class="sticky top-0 py-[26px] px-[150px] w-full h-[135px] box-border">
      <div class="w-full h-3/5 flex items-center justify-start box-border">
        <div class="w-9/12 h-full flex gap-x-[30px]">
          <a href="#" class="block w-fit h-fit">
            <img class="w-24" src="./public/images/header/logo.png" alt="" />
          </a>
          <div
            class="relative pr-2 gap-x-[5px] w-[370px] h-[40px] bg-[#f7f8fa] rounded-[13px] flex items-center justify-start shadow-sm px-[5px]"
          >
            <label for="search"
              ><div class="">
                <img src="./public/svg/search.svg" alt="" /></div
            ></label>
            <div class="w-fit h-fit">
              <input
                type="search"
                id="search"
                class="font-[shabnam] outline-none"
                placeholder="جستجو محصولات"
              />
            </div>
          </div>
          <div class="flex gap-6 items-center">
            <a
              href="#"
              class="font-[shabnam] text-[#a3a3a3] text-[14px] hover:text-[#0a295a]"
              >باشگاه مشتریان</a
            >
            <a
              href="#"
              class="font-[shabnam] text-[#a3a3a3] text-[14px] hover:text-[#0a295a]"
              >بلاگ</a
            >
            <a
              href="#"
              class="font-[shabnam] text-[#a3a3a3] text-[14px] hover:text-[#0a295a]"
              >ارتباط با ما</a
            >
            <a
              href="#"
              class="font-[shabnam] text-[#a3a3a3] text-[14px] hover:text-[#0a295a]"
              >درباره ما</a
            >
          </div>
        </div>
        <div class="w-3/12 h-full flex justify-end items-center gap-x-4">
          <a href="#" class="block w-fit h-fit">
            <div
            class="w-[42px] h-[42px] rounded-xl bg-[#f7f8fa] shadow-sm flex items-center justify-center shadow-gray-300 relative"
          >
            <svg
              fill="#fe5f55"
              viewBox="-1.5 0 19 19"
              xmlns="http://www.w3.org/2000/svg"
              class="cf-icon-svg w-7 hover:fill-[#0a295a]"
            >
              <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
              <g
                id="SVGRepo_tracerCarrier"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></g>
              <g id="SVGRepo_iconCarrier">
                <path
                  d="M14.252 4.59a.924.924 0 0 1 .921.92v3.602a1.048 1.048 0 0 1-.916 1.017l-8.511.883a.573.573 0 0 1-.145.019.577.577 0 1 0 0 1.154h8.488a.563.563 0 1 1 0 1.126h-.91a1.03 1.03 0 1 1-1.104 0H6.849a1.03 1.03 0 1 1-1.104 0H5.6a1.703 1.703 0 1 1 0-3.406.585.585 0 0 1 .128.014L3.111 3.911H1.39a.563.563 0 1 1 0-1.125h2.09a.562.562 0 0 1 .515.337l.64 1.466h9.617z"
                ></path>
              </g>
            </svg>
            <div
              class="w-[20px] h-[21px] bg-[#fe5f55] rounded-full flex items-center justify-center absolute font-[shabnam] top-[-20%] right-[-20%] shadow-sm shadow-gray-400 text-white"
            >
              ۰
            </div>
          </div>
          </a>
          <a href="#" class="block w-fit h-fit">
            <div class="w-[104px] h-[42px] rounded-xl flex items-center justify-center font-[shabnam] text-white text-[14px] shadow-sm bg-[#0a5abd] hover:bg-[#0a295a]">
              ورود و ثبت‌نام
            </div>
          </a>
        </div>
      </div>
      <div class="w-full h-2/5 px-[2px] flex justify-between items-center mt-4"> 
        <div class="font-[shabnam] text-[14px] text-[#fe5f55]" >خانه</div>
      </div>
    </div>
    <!-- #endregion -->
  </body>
</html>
